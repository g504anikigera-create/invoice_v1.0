<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>請求書作成ツール</title>
<style>
  :root{
    --navy:#1f3a52;
    --navy-dark:#16293a;
    --gold:#b8863f;
    --bg:#f2f4f6;
    --card:#ffffff;
    --border:#dde2e7;
    --text:#233140;
    --muted:#6b7680;
    --danger:#c0392b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","YuGothic","Noto Sans JP","Meiryo",sans-serif;
    background:var(--bg);
    color:var(--text);
    -webkit-text-size-adjust:100%;
  }
  h1,h2,h3{margin:0;}
  .hidden{display:none !important;}

  /* ---------- Form screen ---------- */
  .topbar{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; justify-content:space-between;
    background:var(--navy); color:#fff; padding:14px 16px;
  }
  .topbar h1{font-size:17px; letter-spacing:.02em;}
  .icon-btn{
    background:rgba(255,255,255,.12); color:#fff; border:1px solid rgba(255,255,255,.35);
    border-radius:8px; padding:8px 12px; font-size:14px; cursor:pointer;
  }
  .form-main{max-width:720px; margin:0 auto; padding:16px 12px 100px;}
  .card{
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:16px; margin-bottom:14px; box-shadow:0 1px 2px rgba(20,30,40,.04);
  }
  .card h2{font-size:14px; color:var(--navy); margin-bottom:12px; border-left:4px solid var(--gold); padding-left:8px;}
  .field-row{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px;}
  .field-row label{flex:1 1 140px; display:flex; flex-direction:column; font-size:12px; color:var(--muted); gap:4px;}
  input[type="text"], input[type="number"], input[type="date"], select, textarea{
    font-size:15px; padding:9px 8px; border:1px solid var(--border); border-radius:8px;
    font-family:inherit; color:var(--text); background:#fff; width:100%;
  }
  textarea{resize:vertical;}
  .table-wrap{overflow-x:auto; -webkit-overflow-scrolling:touch;}
  #itemsTable{border-collapse:collapse; width:100%; min-width:640px; font-size:13px;}
  #itemsTable th{
    background:#eef2f5; color:var(--navy); font-size:12px; padding:8px 6px; text-align:left; white-space:nowrap;
  }
  #itemsTable td{padding:5px 4px; border-bottom:1px solid var(--border); vertical-align:top;}
  #itemsTable input, #itemsTable select{padding:7px 6px; font-size:13px;}
  .cell-name{min-width:120px;}
  .cell-qty{width:64px;}
  .cell-unit{width:56px;}
  .cell-price{width:90px; margin-top:4px;}
  .cell-preset{width:110px;}
  .cell-note{min-width:100px;}
  .cell-amount{white-space:nowrap; font-variant-numeric:tabular-nums; padding-top:12px !important; font-weight:600;}
  .btn-del{
    background:none; border:none; color:var(--danger); font-size:18px; cursor:pointer; padding:4px 6px;
  }
  #btnAddRow{
    margin-top:10px; background:#fff; border:1px dashed #9fb0bd; color:var(--navy);
    padding:9px 14px; border-radius:8px; font-size:13px; cursor:pointer; width:100%;
  }
  .totals{margin-top:14px; border-top:1px solid var(--border); padding-top:10px;}
  .totals-row{display:flex; justify-content:space-between; padding:5px 4px; font-size:14px;}
  .totals-row span:last-child{font-variant-numeric:tabular-nums; font-weight:600;}
  .total-final{font-size:16px; color:var(--navy); border-top:1px solid var(--border); margin-top:4px; padding-top:8px;}
  .primary-btn{
    display:block; width:100%; background:var(--navy); color:#fff; border:none; border-radius:10px;
    padding:14px; font-size:15px; font-weight:700; cursor:pointer; letter-spacing:.02em;
  }
  .primary-btn:active{background:var(--navy-dark);}
  .warn{color:var(--danger); font-size:12.5px; margin-top:6px; min-height:16px;}
  .hint{font-size:11.5px; color:var(--muted); margin-top:4px;}

  /* ---------- Modal (settings) ---------- */
  .modal{
    position:fixed; inset:0; background:rgba(20,30,40,.5); z-index:50;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .modal-box{
    background:#fff; width:100%; max-width:640px; max-height:92vh; overflow-y:auto;
    border-radius:16px 16px 0 0; padding:18px 16px 24px;
  }
  @media (min-width:700px){
    .modal{align-items:center;}
    .modal-box{border-radius:16px; max-height:88vh;}
  }
  .modal-box h2{font-size:16px; color:var(--navy); margin-bottom:4px;}
  .modal-box h3{font-size:13px; color:var(--navy); margin:16px 0 8px; border-left:4px solid var(--gold); padding-left:8px;}
  .modal-sub{font-size:12px; color:var(--muted); margin-bottom:10px;}
  .preset-row{display:flex; gap:8px; align-items:center; margin-bottom:8px;}
  .preset-row input[type="text"]{flex:1.4;}
  .preset-row input[type="number"]{flex:1;}
  .modal-actions{
    display:flex; gap:8px; margin-top:18px; position:sticky; bottom:-24px; background:#fff; padding-top:10px;
  }
  .btn-secondary{
    flex:1; background:#fff; border:1px solid var(--border); color:var(--text); padding:12px; border-radius:8px; font-size:14px; cursor:pointer;
  }
  .btn-primary-modal{
    flex:1; background:var(--navy); color:#fff; border:none; padding:12px; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer;
  }
  .io-row{display:flex; gap:8px; margin-top:10px;}
  .io-row button{flex:1; font-size:12.5px; padding:9px; border-radius:8px; border:1px solid var(--border); background:#f7f9fa; cursor:pointer;}

  /* ---------- Preview / print screen ---------- */
  .preview-toolbar{
    position:sticky; top:0; z-index:20; display:flex; gap:10px; justify-content:center;
    background:var(--navy); padding:10px 12px;
  }
  .preview-toolbar button{
    padding:10px 16px; border-radius:8px; font-size:14px; border:none; cursor:pointer;
  }
  #btnBack{background:rgba(255,255,255,.15); color:#fff; border:1px solid rgba(255,255,255,.4) !important;}
  #btnPrint{background:var(--gold); color:#fff; font-weight:700;}
  .preview-scroll{padding:14px 8px 60px; overflow-x:auto; background:#d9dfe4;}

  /* ---- invoice sheet (A4) ---- */
  .sheet{
    width:210mm; min-height:297mm; margin:0 auto; background:#fff; color:#20303f;
    padding:14mm 14mm 12mm; font-size:10.3pt; line-height:1.55; box-shadow:0 2px 10px rgba(0,0,0,.15);
  }
  .sheet-top{display:flex; justify-content:space-between; align-items:flex-start; gap:16px;}
  .doc-title{font-size:24pt; letter-spacing:.35em; color:var(--navy); font-weight:700;}
  .doc-sub{font-size:9pt; color:var(--muted); margin-top:4px;}
  .co-block{text-align:right; font-size:9pt; color:#33414f; min-width:60mm;}
  .co-name{font-size:12pt; font-weight:700; color:var(--navy); margin-bottom:3px;}
  .co-stamp{
    display:inline-block; width:14mm; height:14mm; border:1px dashed #b7c1c9; border-radius:2mm;
    color:#b7c1c9; font-size:8pt; text-align:center; line-height:14mm; margin-top:6px;
  }
  .meta-strip{display:flex; justify-content:space-between; align-items:flex-end; margin-top:9mm; border-bottom:2.4pt solid var(--navy); padding-bottom:6mm;}
  .client-name{font-size:15pt; font-weight:700; border-bottom:1pt solid #20303f; padding-bottom:3mm; min-width:70mm;}
  .meta-info{font-size:9pt; text-align:right; color:#33414f;}
  .meta-info div{margin-bottom:2mm;}
  .total-banner{
    margin-top:7mm; display:flex; align-items:center; justify-content:space-between;
    background:#f2f6f8; border-left:5pt solid var(--gold); border-radius:2mm; padding:6mm 8mm;
  }
  .total-banner .label{font-size:10.5pt; color:var(--navy); font-weight:700; letter-spacing:.05em;}
  .total-banner .amount{font-size:19pt; font-weight:700; color:var(--navy); font-variant-numeric:tabular-nums;}
  table.items{width:100%; border-collapse:collapse; margin-top:8mm; font-size:9.3pt;}
  table.items thead th{
    background:var(--navy); color:#fff; padding:3mm 2.5mm; text-align:left; font-weight:600; letter-spacing:.02em;
  }
  table.items thead th.num{text-align:right;}
  table.items tbody td{padding:2.6mm 2.5mm; border-bottom:0.6pt solid #d6dde2; vertical-align:top;}
  table.items tbody tr:nth-child(even){background:#f8fafb;}
  table.items td.num{text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap;}
  table.items td.filler{color:transparent;}
  .col-name{width:34%;} .col-qty{width:8%;} .col-unit{width:8%;} .col-price{width:14%;} .col-amt{width:14%;} .col-note{width:22%;}
  .summary-wrap{display:flex; justify-content:flex-end; margin-top:5mm;}
  .summary-box{width:70mm; font-size:9.6pt;}
  .summary-box .row{display:flex; justify-content:space-between; padding:2.2mm 1mm;}
  .summary-box .row span:last-child{font-variant-numeric:tabular-nums;}
  .summary-box .grand{
    border-top:1pt solid var(--navy); margin-top:1mm; padding-top:3mm; font-size:12.5pt; font-weight:700; color:var(--navy);
  }
  .footer-area{margin-top:10mm; display:flex; gap:10mm;}
  .bank-box{flex:1.1; border:0.8pt solid #d6dde2; border-radius:2mm; padding:5mm 6mm;}
  .bank-box h4{font-size:9.6pt; color:var(--navy); margin:0 0 3mm; letter-spacing:.03em;}
  .bank-box .brow{display:flex; font-size:9pt; margin-bottom:1.6mm;}
  .bank-box .blabel{width:22mm; color:var(--muted);}
  .note-box{flex:1; font-size:8.6pt; color:#3a4956;}
  .note-box p{margin:0 0 4mm; white-space:pre-wrap;}
  .foot-tiny{margin-top:8mm; font-size:7.6pt; color:#9aa4ac; text-align:right;}

  @page{ size:A4; margin:0; }
  @media screen and (max-width:480px){ .sheet{ zoom:0.44; } }
  @media screen and (min-width:481px) and (max-width:760px){ .sheet{ zoom:0.68; } }
  @media screen and (min-width:761px) and (max-width:1000px){ .sheet{ zoom:0.9; } }
  @media print{
    body{background:#fff;}
    .preview-toolbar, #formView{display:none !important;}
    .preview-scroll{padding:0; background:#fff;}
    .sheet{box-shadow:none; margin:0; zoom:1 !important;}
  }
</style>
</head>
<body>

<!-- ============= FORM SCREEN ============= -->
<div id="formView" class="screen">
  <div class="topbar">
    <h1>請求書作成ツール</h1>
    <button class="icon-btn" id="btnSettings">⚙ 設定</button>
  </div>

  <div class="form-main">
    <section class="card">
      <h2>請求先・日付</h2>
      <div class="field-row">
        <label>請求先名
          <input type="text" id="clientName" placeholder="例）株式会社SHINWA">
        </label>
        <label style="max-width:110px;">敬称
          <select id="clientHonorific">
            <option value="御中">御中</option>
            <option value="様">様</option>
            <option value="">（なし）</option>
          </select>
        </label>
      </div>
      <div class="field-row">
        <label>請求日
          <input type="date" id="invoiceDate">
        </label>
        <label>請求書番号（任意）
          <input type="text" id="invoiceNo" placeholder="空欄可">
        </label>
      </div>
    </section>

    <section class="card">
      <h2>明細</h2>
      <div class="table-wrap">
        <table id="itemsTable">
          <thead>
            <tr>
              <th>名称</th><th>数量</th><th>単位</th><th>単価</th><th>金額</th><th>備考</th><th></th>
            </tr>
          </thead>
          <tbody id="itemsBody"></tbody>
        </table>
      </div>
      <button type="button" id="btnAddRow">＋ 行を追加</button>
      <div class="hint">単価欄のプルダウンから設定済みの単価（通常単価・休日手当など）を選べます。「設定」からプリセットの追加・変更ができます。</div>

      <div class="totals">
        <div class="totals-row"><span>小計</span><span id="sumSubtotal">0円</span></div>
        <div class="totals-row"><span>消費税（<span id="taxRateLabel">10</span>%）</span><span id="sumTax">0円</span></div>
        <div class="totals-row total-final"><span>合計</span><span id="sumTotal">0円</span></div>
      </div>
    </section>

    <section class="card">
      <h2>備考（フッター）</h2>
      <textarea id="footerNote" rows="2"></textarea>
    </section>

    <div class="warn" id="formWarn"></div>
    <button type="button" class="primary-btn" id="btnPreview">プレビュー・PDF作成へ進む →</button>
  </div>
</div>

<!-- ============= PRINT / PREVIEW SCREEN ============= -->
<div id="printView" class="screen hidden">
  <div class="preview-toolbar">
    <button id="btnBack">← 編集に戻る</button>
    <button id="btnPrint">🖨 印刷 / PDFで保存</button>
  </div>
  <div class="preview-scroll">
    <div class="sheet" id="invoiceSheet"></div>
  </div>
</div>

<!-- ============= SETTINGS MODAL ============= -->
<div id="settingsModal" class="modal hidden">
  <div class="modal-box">
    <h2>設定（カスタマイズ）</h2>
    <div class="modal-sub">会社情報・振込先など固定項目はここでまとめて変更できます。変更内容はこの端末に保存されます。</div>

    <h3>会社情報（請求書ヘッダーに表示）</h3>
    <div class="field-row">
      <label>会社名・屋号<input type="text" id="setCoName"></label>
      <label>代表者名<input type="text" id="setCoOwner"></label>
    </div>
    <div class="field-row">
      <label>郵便番号<input type="text" id="setCoZip"></label>
      <label style="flex:2 1 220px;">住所<input type="text" id="setCoAddress"></label>
    </div>
    <div class="field-row">
      <label>電話<input type="text" id="setCoTel"></label>
      <label>携帯<input type="text" id="setCoMobile"></label>
      <label>FAX<input type="text" id="setCoFax"></label>
    </div>

    <h3>振込先情報（請求書フッターに表示）</h3>
    <div class="field-row">
      <label>金融機関名<input type="text" id="setBankName"></label>
      <label>支店名<input type="text" id="setBankBranch"></label>
    </div>
    <div class="field-row">
      <label>店番<input type="text" id="setBankBranchNo"></label>
      <label style="max-width:120px;">口座種別
        <select id="setBankType"><option>普通</option><option>当座</option></select>
      </label>
      <label>口座番号<input type="text" id="setBankNo"></label>
    </div>
    <div class="field-row">
      <label>口座名義<input type="text" id="setBankHolder"></label>
    </div>

    <h3>単価プリセット</h3>
    <div class="modal-sub">明細行の「単価」プルダウンに表示される候補です。</div>
    <div id="presetList"></div>
    <button type="button" class="btn-secondary" id="btnAddPreset" style="margin-top:4px;">＋ プリセットを追加</button>

    <h3>消費税率・デフォルト備考</h3>
    <div class="field-row">
      <label style="max-width:120px;">消費税率(%)<input type="number" id="setTaxRate" min="0" max="100" step="0.1"></label>
      <label style="flex:2 1 220px;">請求書フッターのデフォルト備考文<input type="text" id="setDefaultNote"></label>
    </div>

    <div class="io-row">
      <button type="button" id="btnExportSettings">設定をJSONで書き出す</button>
      <button type="button" id="btnImportSettingsTrigger">JSONから設定を読み込む</button>
      <input type="file" id="importSettingsFile" accept="application/json" class="hidden">
    </div>

    <div class="modal-actions">
      <button type="button" class="btn-secondary" id="btnSettingsCancel">キャンセル</button>
      <button type="button" class="btn-primary-modal" id="btnSettingsSave">保存する</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  var STORAGE_KEY = "invoiceApp.settings.v1";
  var DRAFT_KEY = "invoiceApp.draft.v1";

  var DEFAULT_SETTINGS = {
    company:{
      name:"河村塗装",
      owner:"河村尚",
      zip:"437-0626",
      address:"静岡県浜松市天竜区春野町領家901-2",
      tel:"053-985-0207",
      mobile:"090-1820-5112",
      fax:"053-985-0207"
    },
    bank:{
      bankName:"浜松磐田信用金庫",
      branch:"春野支店",
      branchNo:"018",
      accountType:"普通",
      accountNo:"5023531",
      holder:"河村塗装　河村尚"
    },
    presets:[
      {label:"通常単価", price:18000},
      {label:"休日手当", price:5000}
    ],
    taxRate:10,
    defaultNote:"恐れ入りますが、振込手数料は貴社にてご負担願います。"
  };

  function deepClone(o){ return JSON.parse(JSON.stringify(o)); }

  function loadSettings(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return deepClone(DEFAULT_SETTINGS);
      var parsed = JSON.parse(raw);
      // merge with defaults so new fields introduced later don't break old saved data
      var merged = deepClone(DEFAULT_SETTINGS);
      merged.company = Object.assign(merged.company, parsed.company||{});
      merged.bank = Object.assign(merged.bank, parsed.bank||{});
      merged.presets = Array.isArray(parsed.presets) && parsed.presets.length ? parsed.presets : merged.presets;
      merged.taxRate = (typeof parsed.taxRate === "number") ? parsed.taxRate : merged.taxRate;
      merged.defaultNote = (typeof parsed.defaultNote === "string") ? parsed.defaultNote : merged.defaultNote;
      return merged;
    }catch(e){
      return deepClone(DEFAULT_SETTINGS);
    }
  }

  function saveSettings(s){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
  }

  var settings = loadSettings();

  // ---------------- state ----------------
  var items = [];
  var rowSeq = 0;

  function pad2(n){ return (n<10?"0":"")+n; }
  function todayISO(){
    var d = new Date();
    return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());
  }
  function isoToJP(iso){
    if(!iso) return "";
    var p = iso.split("-");
    return p[0]+"年"+p[1]+"月"+p[2]+"日";
  }
  function yen(n){
    n = Math.round(Number(n)||0);
    return n.toLocaleString("ja-JP")+"円";
  }

  function newRow(prefill){
    rowSeq++;
    var firstPreset = settings.presets[0];
    var base = {
      id: rowSeq,
      name: "",
      qty: "",
      unit: "人",
      price: firstPreset ? firstPreset.price : "",
      note: ""
    };
    if(prefill) Object.assign(base, prefill);
    return base;
  }

  function defaultFirstRow(){
    var d = new Date();
    return newRow({ name: (d.getMonth()+1)+"月分" });
  }

  // ---------------- DOM refs ----------------
  var el = {};
  [
    "formView","printView","invoiceSheet",
    "clientName","clientHonorific","invoiceDate","invoiceNo",
    "itemsBody","btnAddRow","sumSubtotal","sumTax","sumTotal","taxRateLabel",
    "footerNote","formWarn","btnPreview","btnBack","btnPrint",
    "btnSettings","settingsModal","btnSettingsCancel","btnSettingsSave",
    "setCoName","setCoOwner","setCoZip","setCoAddress","setCoTel","setCoMobile","setCoFax",
    "setBankName","setBankBranch","setBankBranchNo","setBankType","setBankNo","setBankHolder",
    "presetList","btnAddPreset","setTaxRate","setDefaultNote",
    "btnExportSettings","btnImportSettingsTrigger","importSettingsFile"
  ].forEach(function(id){ el[id] = document.getElementById(id); });

  // ---------------- items table rendering ----------------
  function renderRows(){
    var presetOptions = '<option value="">単価選択</option>' +
      settings.presets.map(function(p,i){ return '<option value="'+i+'">'+escapeHtml(p.label)+'（'+p.price.toLocaleString("ja-JP")+'円）</option>'; }).join("") +
      '<option value="custom">直接入力</option>';

    el.itemsBody.innerHTML = items.map(function(row, i){
      var amount = (Number(row.qty)||0) * (Number(row.price)||0);
      return (
        '<tr data-i="'+i+'">'+
          '<td><input type="text" class="cell-name" value="'+escapeAttr(row.name)+'" placeholder="例）4月分"></td>'+
          '<td><input type="number" class="cell-qty" value="'+escapeAttr(row.qty)+'" min="0" step="0.5" inputmode="decimal"></td>'+
          '<td><input type="text" class="cell-unit" value="'+escapeAttr(row.unit)+'"></td>'+
          '<td>'+
            '<select class="cell-preset">'+presetOptions+'</select>'+
            '<input type="number" class="cell-price" value="'+escapeAttr(row.price)+'" min="0" step="1">'+
          '</td>'+
          '<td class="cell-amount">'+yen(amount)+'</td>'+
          '<td><input type="text" class="cell-note" value="'+escapeAttr(row.note)+'" placeholder="任意"></td>'+
          '<td><button type="button" class="btn-del" title="行を削除">×</button></td>'+
        '</tr>'
      );
    }).join("");
    recalcTotals();
  }

  function escapeHtml(s){
    return String(s==null?"":s).replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
    });
  }
  function escapeAttr(s){ return escapeHtml(s); }

  function recalcTotals(){
    var subtotal = items.reduce(function(sum, row){
      return sum + (Number(row.qty)||0) * (Number(row.price)||0);
    }, 0);
    var rate = Number(settings.taxRate)||0;
    var tax = Math.round(subtotal * rate / 100);
    var total = subtotal + tax;
    el.sumSubtotal.textContent = yen(subtotal);
    el.sumTax.textContent = yen(tax);
    el.sumTotal.textContent = yen(total);
    el.taxRateLabel.textContent = rate;
    return {subtotal:subtotal, tax:tax, total:total, rate:rate};
  }

  // event delegation for items table
  el.itemsBody.addEventListener("input", function(ev){
    var tr = ev.target.closest("tr");
    if(!tr) return;
    var i = Number(tr.getAttribute("data-i"));
    var row = items[i];
    if(!row) return;
    if(ev.target.classList.contains("cell-name")) row.name = ev.target.value;
    else if(ev.target.classList.contains("cell-qty")) row.qty = ev.target.value;
    else if(ev.target.classList.contains("cell-unit")) row.unit = ev.target.value;
    else if(ev.target.classList.contains("cell-price")) row.price = ev.target.value;
    else if(ev.target.classList.contains("cell-note")) row.note = ev.target.value;

    if(ev.target.classList.contains("cell-qty") || ev.target.classList.contains("cell-price")){
      var amount = (Number(row.qty)||0) * (Number(row.price)||0);
      tr.querySelector(".cell-amount").textContent = yen(amount);
      recalcTotals();
    }
    saveDraft();
  });

  el.itemsBody.addEventListener("change", function(ev){
    var tr = ev.target.closest("tr");
    if(!tr) return;
    var i = Number(tr.getAttribute("data-i"));
    var row = items[i];
    if(!row) return;
    if(ev.target.classList.contains("cell-preset")){
      var v = ev.target.value;
      if(v !== "" && v !== "custom"){
        var preset = settings.presets[Number(v)];
        if(preset){
          row.price = preset.price;
          if(!row.name) row.name = preset.label;
          renderRows();
          saveDraft();
        }
      }
    }
  });

  el.itemsBody.addEventListener("click", function(ev){
    if(ev.target.classList.contains("btn-del")){
      var tr = ev.target.closest("tr");
      var i = Number(tr.getAttribute("data-i"));
      items.splice(i,1);
      renderRows();
      saveDraft();
    }
  });

  el.btnAddRow.addEventListener("click", function(){
    items.push(newRow());
    renderRows();
    saveDraft();
  });

  // ---------------- draft persistence ----------------
  function saveDraft(){
    try{
      localStorage.setItem(DRAFT_KEY, JSON.stringify({
        clientName: el.clientName.value,
        clientHonorific: el.clientHonorific.value,
        invoiceDate: el.invoiceDate.value,
        invoiceNo: el.invoiceNo.value,
        footerNote: el.footerNote.value,
        items: items
      }));
    }catch(e){}
  }
  function loadDraft(){
    try{
      var raw = localStorage.getItem(DRAFT_KEY);
      if(!raw) return null;
      return JSON.parse(raw);
    }catch(e){ return null; }
  }

  ["clientName","clientHonorific","invoiceDate","invoiceNo","footerNote"].forEach(function(id){
    el[id].addEventListener("input", saveDraft);
    el[id].addEventListener("change", saveDraft);
  });

  function initForm(){
    var draft = loadDraft();
    if(draft){
      el.clientName.value = draft.clientName || "";
      el.clientHonorific.value = draft.clientHonorific || "御中";
      el.invoiceDate.value = draft.invoiceDate || todayISO();
      el.invoiceNo.value = draft.invoiceNo || "";
      el.footerNote.value = (typeof draft.footerNote === "string") ? draft.footerNote : settings.defaultNote;
      items = Array.isArray(draft.items) && draft.items.length ? draft.items : [defaultFirstRow()];
      rowSeq = items.reduce(function(m,r){ return Math.max(m, r.id||0); }, 0);
    } else {
      el.invoiceDate.value = todayISO();
      el.clientHonorific.value = "御中";
      el.footerNote.value = settings.defaultNote;
      items = [defaultFirstRow()];
    }
    renderRows();
  }

  // ---------------- preview / print ----------------
  function buildInvoiceHTML(){
    var totals = recalcTotals();
    var honorific = el.clientHonorific.value;
    var clientDisplay = (el.clientName.value || "").trim() + (honorific ? "　"+honorific : "");
    var dateJP = isoToJP(el.invoiceDate.value || todayISO());
    var invoiceNo = (el.invoiceNo.value || "").trim();
    var note = el.footerNote.value || "";
    var c = settings.company, b = settings.bank;

    var MIN_ROWS = 8;
    var rowsHtml = items.map(function(row){
      var amount = (Number(row.qty)||0) * (Number(row.price)||0);
      return (
        '<tr>'+
          '<td class="col-name">'+escapeHtml(row.name)+'</td>'+
          '<td class="col-qty num">'+escapeHtml(row.qty)+'</td>'+
          '<td class="col-unit">'+escapeHtml(row.unit)+'</td>'+
          '<td class="col-price num">'+(row.price!==""&&row.price!=null ? Number(row.price).toLocaleString("ja-JP")+'円' : '')+'</td>'+
          '<td class="col-amt num">'+(amount ? amount.toLocaleString("ja-JP")+'円' : '')+'</td>'+
          '<td class="col-note">'+escapeHtml(row.note)+'</td>'+
        '</tr>'
      );
    }).join("");
    var fillerCount = Math.max(0, MIN_ROWS - items.length);
    for(var k=0;k<fillerCount;k++){
      rowsHtml += '<tr><td class="col-name filler">-</td><td class="col-qty num filler">-</td><td class="col-unit filler">-</td><td class="col-price num filler">-</td><td class="col-amt num filler">-</td><td class="col-note filler">-</td></tr>';
    }

    var html =
      '<div class="sheet-top">'+
        '<div>'+
          '<div class="doc-title">請求書</div>'+
          '<div class="doc-sub">下記の通りご請求申し上げます。</div>'+
        '</div>'+
        '<div class="co-block">'+
          '<div class="co-name">'+escapeHtml(c.name)+'</div>'+
          '<div>〒'+escapeHtml(c.zip)+'</div>'+
          '<div>'+escapeHtml(c.address)+'</div>'+
          '<div>TEL：'+escapeHtml(c.tel)+(c.mobile ? '　携帯：'+escapeHtml(c.mobile) : '')+'</div>'+
          (c.fax ? '<div>FAX：'+escapeHtml(c.fax)+'</div>' : '')+
          '<div>'+escapeHtml(c.owner)+'</div>'+
          '<div class="co-stamp">印</div>'+
        '</div>'+
      '</div>'+
      '<div class="meta-strip">'+
        '<div class="client-name">'+escapeHtml(clientDisplay || "　")+'</div>'+
        '<div class="meta-info">'+
          '<div>請求日：'+dateJP+'</div>'+
          (invoiceNo ? '<div>請求書番号：'+escapeHtml(invoiceNo)+'</div>' : '')+
        '</div>'+
      '</div>'+
      '<div class="total-banner">'+
        '<span class="label">ご請求金額（税込）</span>'+
        '<span class="amount">'+totals.total.toLocaleString("ja-JP")+'円</span>'+
      '</div>'+
      '<table class="items">'+
        '<colgroup><col class="col-name"><col class="col-qty"><col class="col-unit"><col class="col-price"><col class="col-amt"><col class="col-note"></colgroup>'+
        '<thead><tr>'+
          '<th>名称</th><th class="num">数量</th><th>単位</th><th class="num">単価</th><th class="num">金額</th><th>備考</th>'+
        '</tr></thead>'+
        '<tbody>'+rowsHtml+'</tbody>'+
      '</table>'+
      '<div class="summary-wrap">'+
        '<div class="summary-box">'+
          '<div class="row"><span>小計</span><span>'+totals.subtotal.toLocaleString("ja-JP")+'円</span></div>'+
          '<div class="row"><span>消費税（'+totals.rate+'%）</span><span>'+totals.tax.toLocaleString("ja-JP")+'円</span></div>'+
          '<div class="row grand"><span>合計</span><span>'+totals.total.toLocaleString("ja-JP")+'円</span></div>'+
        '</div>'+
      '</div>'+
      '<div class="footer-area">'+
        '<div class="bank-box">'+
          '<h4>お振込先</h4>'+
          '<div class="brow"><span class="blabel">金融機関</span><span>'+escapeHtml(b.bankName)+'　'+escapeHtml(b.branch)+'（店番'+escapeHtml(b.branchNo)+'）</span></div>'+
          '<div class="brow"><span class="blabel">口座番号</span><span>'+escapeHtml(b.accountType)+'　'+escapeHtml(b.accountNo)+'</span></div>'+
          '<div class="brow"><span class="blabel">口座名義</span><span>'+escapeHtml(b.holder)+'</span></div>'+
        '</div>'+
        '<div class="note-box">'+
          '<h4 style="color:#1f3a52;font-size:9.6pt;margin:0 0 3mm;">備考</h4>'+
          '<p>'+escapeHtml(note)+'</p>'+
        '</div>'+
      '</div>'+
      '<div class="foot-tiny">'+escapeHtml(c.name)+'　発行日：'+dateJP+'</div>';

    el.invoiceSheet.innerHTML = html;
  }

  function validateBeforePreview(){
    if(!(el.clientName.value||"").trim()){
      el.formWarn.textContent = "請求先名を入力してください。";
      el.clientName.focus();
      return false;
    }
    var hasValidRow = items.some(function(r){ return (Number(r.qty)||0) > 0 && (Number(r.price)||0) > 0; });
    if(!hasValidRow){
      el.formWarn.textContent = "数量・単価が入力された明細行を1つ以上入力してください。";
      return false;
    }
    el.formWarn.textContent = "";
    return true;
  }

  el.btnPreview.addEventListener("click", function(){
    if(!validateBeforePreview()) return;
    buildInvoiceHTML();
    el.formView.classList.add("hidden");
    el.printView.classList.remove("hidden");
    window.scrollTo(0,0);
  });

  el.btnBack.addEventListener("click", function(){
    el.printView.classList.add("hidden");
    el.formView.classList.remove("hidden");
  });

  el.btnPrint.addEventListener("click", function(){
    window.print();
  });

  // ---------------- settings modal ----------------
  function openSettings(){
    el.setCoName.value = settings.company.name;
    el.setCoOwner.value = settings.company.owner;
    el.setCoZip.value = settings.company.zip;
    el.setCoAddress.value = settings.company.address;
    el.setCoTel.value = settings.company.tel;
    el.setCoMobile.value = settings.company.mobile;
    el.setCoFax.value = settings.company.fax;

    el.setBankName.value = settings.bank.bankName;
    el.setBankBranch.value = settings.bank.branch;
    el.setBankBranchNo.value = settings.bank.branchNo;
    el.setBankType.value = settings.bank.accountType;
    el.setBankNo.value = settings.bank.accountNo;
    el.setBankHolder.value = settings.bank.holder;

    el.setTaxRate.value = settings.taxRate;
    el.setDefaultNote.value = settings.defaultNote;

    renderPresetEditor();
    el.settingsModal.classList.remove("hidden");
  }

  function renderPresetEditor(){
    el.presetList.innerHTML = settings.presets.map(function(p, i){
      return (
        '<div class="preset-row" data-i="'+i+'">'+
          '<input type="text" class="preset-label" value="'+escapeAttr(p.label)+'" placeholder="例）夜間手当">'+
          '<input type="number" class="preset-price" value="'+escapeAttr(p.price)+'" placeholder="単価">'+
          '<button type="button" class="btn-del preset-del">×</button>'+
        '</div>'
      );
    }).join("");
  }

  el.presetList.addEventListener("input", function(ev){
    var row = ev.target.closest(".preset-row");
    if(!row) return;
    var i = Number(row.getAttribute("data-i"));
    if(ev.target.classList.contains("preset-label")) settings.presets[i].label = ev.target.value;
    if(ev.target.classList.contains("preset-price")) settings.presets[i].price = Number(ev.target.value)||0;
  });
  el.presetList.addEventListener("click", function(ev){
    if(ev.target.classList.contains("preset-del")){
      var row = ev.target.closest(".preset-row");
      var i = Number(row.getAttribute("data-i"));
      settings.presets.splice(i,1);
      renderPresetEditor();
    }
  });
  el.btnAddPreset.addEventListener("click", function(){
    settings.presets.push({label:"", price:0});
    renderPresetEditor();
  });

  el.btnSettings.addEventListener("click", openSettings);
  el.btnSettingsCancel.addEventListener("click", function(){
    settings = loadSettings(); // discard in-memory edits
    el.settingsModal.classList.add("hidden");
  });

  el.btnSettingsSave.addEventListener("click", function(){
    settings.company = {
      name: el.setCoName.value, owner: el.setCoOwner.value, zip: el.setCoZip.value,
      address: el.setCoAddress.value, tel: el.setCoTel.value, mobile: el.setCoMobile.value, fax: el.setCoFax.value
    };
    settings.bank = {
      bankName: el.setBankName.value, branch: el.setBankBranch.value, branchNo: el.setBankBranchNo.value,
      accountType: el.setBankType.value, accountNo: el.setBankNo.value, holder: el.setBankHolder.value
    };
    settings.taxRate = Number(el.setTaxRate.value)||0;
    settings.defaultNote = el.setDefaultNote.value;
    settings.presets = settings.presets.filter(function(p){ return (p.label||"").trim() !== ""; });
    saveSettings(settings);
    el.settingsModal.classList.add("hidden");
    renderRows(); // refresh preset dropdown + tax label
  });

  el.btnExportSettings.addEventListener("click", function(){
    var blob = new Blob([JSON.stringify(settings, null, 2)], {type:"application/json"});
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "invoice-settings.json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });

  el.btnImportSettingsTrigger.addEventListener("click", function(){
    el.importSettingsFile.click();
  });
  el.importSettingsFile.addEventListener("change", function(ev){
    var file = ev.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(){
      try{
        var parsed = JSON.parse(reader.result);
        settings.company = Object.assign(settings.company, parsed.company||{});
        settings.bank = Object.assign(settings.bank, parsed.bank||{});
        if(Array.isArray(parsed.presets) && parsed.presets.length) settings.presets = parsed.presets;
        if(typeof parsed.taxRate === "number") settings.taxRate = parsed.taxRate;
        if(typeof parsed.defaultNote === "string") settings.defaultNote = parsed.defaultNote;
        openSettings();
      }catch(e){
        alert("JSONの読み込みに失敗しました。ファイル内容をご確認ください。");
      }
    };
    reader.readAsText(file);
    el.importSettingsFile.value = "";
  });

  // ---------------- init ----------------
  initForm();
})();
</script>
</body>
</html>
